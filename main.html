<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Фолиант</title>
    <style>
        :root {
            --bg: #0f061a;
            --nav-bg: #140a24;
            --card: #1a0f2b;
            --accent: #a855f7;
            --accent-light: #d8b4fe;
            --text: #e9d5ff;
            --hp-red: #ff4d4d;
            --hp-green: #2ecc71;
            --gold: #c084fc;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh; /* Фолбек для старых браузеров */
            height: 100dvh; /* Динамическая высота для мобильных */
            background: radial-gradient(circle at 20% 20%, #1a0f2b, #0f061a 80%);
            color: var(--text);
            font-family: 'Georgia', serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        nav {
            display: flex;
            align-items: center;
            background: var(--nav-bg);
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            z-index: 10;
            position: relative;
            width: 100%;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            min-width: 0;
            padding: 15px 5px;
            border: none;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: 0.3s;
            opacity: 0.6;
            border-bottom: 3px solid transparent;
            outline: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: 'Georgia', serif;
            text-shadow: 0 0 6px rgba(168, 85, 247, 0.6);
        }

        .tab-btn.active {
            opacity: 1 !important;
            color: var(--accent-light) !important;
            background: rgba(168, 85, 247, 0.1);
            border-bottom: 3px solid var(--accent) !important;
        }

        /* Контейнер HP, адаптированный под новую палитру */
        .hp-container {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            border-left: 1px solid rgba(168, 85, 247, 0.3);
            flex-shrink: 0;
        }

        .hp-display-wrapper {
            display: flex;
            align-items: center;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            user-select: none;
            min-width: 55px;
            justify-content: center;
        }

        #hp-current {
            color: var(--hp-red);
            transition: transform 0.15s, color 0.3s;
            display: inline-block;
        }

        .hp-divider {
            color: #5b21b6;
            margin: 0 2px;
        }

        #hp-max {
            color: var(--gold);
            cursor: pointer;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        #hp-max:hover {
            color: var(--accent-light);
        }

        .hp-btn {
            background: #1f1235;
            border: 1px solid #5b21b6;
            color: var(--text);
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: 0.2s;
            padding: 0;
            outline: none;
        }

        .hp-btn:active {
            background: var(--accent);
            transform: translateY(1px);
        }

        .heal-btn {
            color: var(--hp-green);
            margin-left: 2px;
        }

        @media (max-width: 480px) {
            .tab-btn { font-size: 0.7rem; padding: 12px 2px; }
            .hp-container { padding: 0 5px; gap: 3px; }
            .hp-btn { width: 22px; height: 22px; font-size: 0.75rem; }
            .hp-display-wrapper { min-width: 45px; font-size: 0.9rem; }
        }

        .content-container {
            flex: 1;
            width: 100%;
            position: relative;

            overflow-y: auto;
            -webkit-overflow-scrolling: touch;

            padding-bottom: calc(env(safe-area-inset-bottom) + 15px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            vertical-align: bottom; /* Убирает лишние микро-отступы фрейма */
        }
        iframe.active { display: block; }
    </style>
</head>
<body>

<nav>
    <button id="btn-spells-tab" class="tab-btn" onclick="openTab(event, 'spells-tab')">📜 Книга</button>
    <button id="btn-forms-tab" class="tab-btn" onclick="openTab(event, 'forms-tab')">🐻 Облики</button>
    <button id="btn-animals-tab" class="tab-btn" onclick="openTab(event, 'animals-tab')">🐾 Существа</button>

    <div class="hp-container">
        <button class="hp-btn" onclick="changeHP(-1)">−</button>
        <div class="hp-display-wrapper">
            <span id="hp-current">0</span>
            <span class="hp-divider">/</span>
            <span id="hp-max" onclick="editMaxHP()">0</span>
        </div>
        <button class="hp-btn" onclick="changeHP(1)">+</button>
        <button class="hp-btn heal-btn" onclick="restoreHP()" title="Восстановить всё">❤</button>
    </div>
</nav>

<div class="content-container">
    <iframe id="spells-tab" src="spells_book.html"></iframe>
    <iframe id="forms-tab" src="forms.html"></iframe>
    <iframe id="animals-tab" src="animals.html"></iframe>
</div>

<script>
    function getSafeValue(key, fallback) {
        const val = localStorage.getItem(key);
        const parsed = parseInt(val);
        return isNaN(parsed) ? fallback : parsed;
    }

    let currentHP = getSafeValue('my_hp', 45);
    let maxHP = getSafeValue('my_max_hp', 45);

    const hpCurrentEl = document.getElementById('hp-current');
    const hpMaxEl = document.getElementById('hp-max');

    function updateHPUI() {
        if (!hpCurrentEl || !hpMaxEl) return;
        hpCurrentEl.innerText = currentHP;
        hpMaxEl.innerText = maxHP;
        hpCurrentEl.style.color = (currentHP >= maxHP) ? 'var(--hp-green)' : 'var(--hp-red)';
    }

    function changeHP(delta) {
        currentHP += delta;
        if (currentHP < 0) currentHP = 0;
        if (currentHP > maxHP) currentHP = maxHP;
        saveAndAnimate();
    }

    function restoreHP() {
        currentHP = maxHP;
        saveAndAnimate();
    }

    function saveAndAnimate() {
        localStorage.setItem('my_hp', currentHP);
        updateHPUI();
        hpCurrentEl.style.transform = 'scale(1.3)';
        setTimeout(() => hpCurrentEl.style.transform = 'scale(1)', 100);
    }

    function editMaxHP() {
        const val = prompt("Максимальные ОЗ:", maxHP);
        if (val !== null && !isNaN(parseInt(val))) {
            maxHP = Math.max(1, parseInt(val));
            localStorage.setItem('my_max_hp', maxHP);
            if (currentHP > maxHP) currentHP = maxHP;
            updateHPUI();
        }
    }

    function openTab(evt, tabId) {
        document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        const target = document.getElementById(tabId);
        if (target) target.classList.add('active');

        if (evt) {
            evt.currentTarget.classList.add('active');
        } else {
            const btn = document.getElementById('btn-' + tabId);
            if (btn) btn.classList.add('active');
        }
        localStorage.setItem('active_tab', tabId);
    }

    window.onload = function() {
        updateHPUI();
        const savedTab = localStorage.getItem('active_tab') || 'spells-tab';
        openTab(null, savedTab);
    };
</script>

</body>
</html>
