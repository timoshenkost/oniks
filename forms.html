<!DOCTYPE html>
<html lang="ru">
<head>
<script src="forms.js"></script>
<script src="render_creature.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Облики друида</title>

<style>
/* --- ОРИГИНАЛЬНЫЕ СТИЛИ (для сетки и карточек) --- */
:root {
  --bg: #0f061a;
  --card: #1a0f2b;
  --card-open: #24153a;
  --accent: #a855f7;
  --accent-light: #d8b4fe;
  --text: #e9d5ff;
  --gold: #c084fc;
}

body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: radial-gradient(circle at 20% 20%, #1a0f2b, #0f061a 80%);
  color: var(--text);
}

header {
  text-align: center;
  padding: 20px;
  background: #140a24;
  border-bottom: 2px solid var(--accent);
  box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
}

h1 { display: flex; justify-content: center; align-items: center; gap: 15px; }
h1 span { color: var(--accent); font-size: 1.2em; }

.wild-shape-tracker {
  margin-top: 15px; padding: 10px;
  background: rgba(0, 0, 0, 0.2); border-radius: 12px;
  display: inline-block;
}

.slots-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }

.slot {
  width: 30px; height: 30px; border: 2px solid var(--accent);
  border-radius: 50%; cursor: pointer; position: relative; transition: 0.3s;
}

.slot.active { background: var(--accent); box-shadow: 0 0 15px var(--accent), inset 0 0 5px white; }
.slot.spent { background: transparent; border-color: #4b218b; }
.slot.spent::after { content: "✕"; color: #4b218b; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

button {
  background: #1f1235; color: var(--text); border: 1px solid var(--accent);
  padding: 8px 12px; border-radius: 4px; cursor: pointer; transition: 0.2s;
}
button:hover { background: var(--accent); color: white; }
.btn-restore-all { border-color: var(--gold); color: var(--gold); }

/* Стили из render_creature.js */
main { max-width: 800px; margin: auto; padding: 15px; }

.creature { border: 1px solid #5b21b6; border-radius: 10px; margin-bottom: 14px; background: var(--card); overflow: hidden; }
.creature summary { padding: 12px; cursor: pointer; font-weight: bold; background: #1f1235; list-style: none; display: flex; align-items: center; }
.creature summary::-webkit-details-marker { display: none; }

.content { padding: 15px; }
.top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
.top-grid b { color: var(--accent-light); }

.stats { display: grid; grid-template-columns: repeat(6, 1fr); text-align: center; margin: 12px 0; }
.stat-name { font-size: 0.7rem; color: var(--accent-light); }
.stat-value { font-size: 1.1rem; font-weight: bold; }
.stat-mod { font-size: 0.8rem; color: var(--gold); }
.stat-save { font-size: 0.7rem; color: var(--accent-light); min-height: 14px; margin-top: 2px; }

.section-title { margin-top: 12px; color: var(--accent-light); font-weight: bold; }
.action { margin-top: 6px; font-size: 0.9rem; padding: 6px; border-left: 2px solid var(--accent); background: rgba(168, 85, 247, 0.05); }

/* Иконка раскрытия в конце summary */
.summary-name { flex-grow: 1; }
.summary-chevron { color: var(--accent); margin-left: 10px; }
details[open] .summary-chevron { transform: rotate(90deg); }

/* Книга заклинаний */
#search {
  width: 100%; padding: 12px; border-radius: 8px;
  border: 1px solid #5b21b6; background: rgba(20, 10, 36, 0.6); color: white;
  box-sizing: border-box; margin: 20px 0; font-family: inherit; outline: none;
}

h2 {
  margin-top: 30px; font-size: 1.1rem; color: var(--accent-light);
  text-transform: uppercase; background: rgba(168, 85, 247, 0.1);
  padding: 8px 15px; border-left: 4px solid var(--accent);
}

.move-btn {
  background: rgba(168, 85, 247, 0.1);
  border: 1px solid var(--accent);
  color: var(--accent-light);
  padding: 2px 10px; border-radius: 4px;
  font-family: monospace; font-weight: bold;
  margin-right: 15px;
}

#modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 100;
  justify-content: center; align-items: center;
}
.modal-content {
  background: var(--card); border: 2px solid var(--accent);
  padding: 30px; border-radius: 15px; text-align: center; max-width: 300px;
}
</style>
</head>

<body>

<header>
  <h1><span class="druid-icon">🐻</span>Дикие облики</h1>
  <div class="wild-shape-tracker">
    <div class="slots-row" id="slots-container"></div>
    <div class="controls">
      <button onclick="restoreOne()">+1 Заряд</button>
      <button class="btn-restore-all" onclick="showResetModal()">Длительный отдых</button>
    </div>
  </div>
</header>

<main>
  <input id="search" placeholder="Поиск облика...">
  <h2>Подготовленные облики</h2>
  <div id="prepared-list"></div>
  <h2>Доступные формы</h2>
  <div id="available-list"></div>
</main>

<div id="modal-overlay">
  <div class="modal-content">
    <h3 style="margin-top:0; color:var(--accent-light)">Длительный отдых?</h3>
    <p>Восстановить все заряды Дикого облика?</p>
    <div style="display:flex; gap:15px; justify-content:center; margin-top:20px;">
      <button onclick="confirmReset(true)" style="border-color:var(--gold); color:var(--gold)">Да</button>
      <button onclick="confirmReset(false)">Нет</button>
    </div>
  </div>
</div>

<script>
const DRUID_STATS = { int: 8, wis: 18, cha: 12 };
const MAX_SHAPE_SLOTS = 3;

let forms = initialForms.map(f => ({ ...f, prepared: false }));
let shapeSlots = JSON.parse(localStorage.getItem('wild_shape_slots')) || Array(MAX_SHAPE_SLOTS).fill(true);

const savedPrepared = JSON.parse(localStorage.getItem('prepared_forms_data')) || [];
forms.forEach(f => { if(savedPrepared.includes(f.name)) f.prepared = true; });

// Вспомогательная функция для перевода числа в строку "+4"
function toModStr(val) { return val >= 0 ? `+${val}` : `${val}`; }

function applyDruidBuffs(original) {
    const c = JSON.parse(JSON.stringify(original));

    // 1. Обработка ментальных характеристик и их спасбросков
    ['int', 'wis', 'cha'].forEach(statKey => {
        if (c.stats[statKey].value < DRUID_STATS[statKey]) {
            const oldMod = parseInt(c.stats[statKey].mod);
            const newMod = Math.floor((DRUID_STATS[statKey] - 10) / 2);
            const modDiff = newMod - oldMod;

            // Обновляем значение и модификатор
            c.stats[statKey].value = DRUID_STATS[statKey];
            c.stats[statKey].mod = toModStr(newMod);

            // Если был спасбросок, увеличиваем его на разницу модификаторов
            if (c.stats[statKey].save) {
                const oldSave = parseInt(c.stats[statKey].save);
                c.stats[statKey].save = toModStr(oldSave + modDiff);
            }
        }
    });

    const currentWisMod = parseInt(c.stats.wis.mod);

    // 2. КД (13 + мод. Мудрости)
    const druidAC = 13 + currentWisMod;
    if (parseInt(c.ac) < druidAC) {
        c.ac = druidAC.toString();
    }

    // 3. Спасбросок Телосложения (текущий спас формы + мод. Мудрости друида)
    // Мудрость друида 18 дает +4. Прибавляем именно +4 к тому, что уже есть у формы.
    const druidWisBonus = 4;
    const baseConMod = parseInt(c.stats.con.mod);
    const currentConSave = c.stats.con.save ? parseInt(c.stats.con.save) : baseConMod;
    c.stats.con.save = toModStr(currentConSave + druidWisBonus);

    return c;
}

function saveState() {
    localStorage.setItem('wild_shape_slots', JSON.stringify(shapeSlots));
    const preparedNames = forms.filter(f => f.prepared).map(f => f.name);
    localStorage.setItem('prepared_forms_data', JSON.stringify(preparedNames));
}

function togglePrepared(index) {
    forms[index].prepared = !forms[index].prepared;
    saveState();
    renderAll();
}

function renderTracker() {
  const container = document.getElementById('slots-container');
  container.innerHTML = '';
  shapeSlots.forEach((isActive, index) => {
    const slotDiv = document.createElement('div');
    slotDiv.className = `slot ${isActive ? 'active' : 'spent'}`;
    slotDiv.onclick = () => { shapeSlots[index] = !shapeSlots[index]; saveState(); renderTracker(); };
    container.appendChild(slotDiv);
  });
}

function createFormCard(form, index) {
    const buffedForm = applyDruidBuffs(form);
    const htmlString = renderStatBlock(buffedForm);

    const wrapper = document.createElement('div');
    wrapper.innerHTML = htmlString;
    const details = wrapper.querySelector('details');
    const summary = details.querySelector('summary');

    const originalName = summary.innerText.trim();
    summary.innerHTML = `
        <button class="move-btn" onclick="event.stopPropagation(); togglePrepared(${index})">
            ${form.prepared ? '−' : '+'}
        </button>
        <span class="summary-name">${originalName}</span>
        <span class="summary-chevron">▸</span>
    `;

    return details;
}

function renderAll() {
    const prepList = document.getElementById('prepared-list');
    const availList = document.getElementById('available-list');
    prepList.innerHTML = ''; availList.innerHTML = '';

    forms.forEach((f, i) => {
        const card = createFormCard(f, i);
        if (f.prepared) prepList.appendChild(card);
        else availList.appendChild(card);
    });
}

// Утилиты управления
function restoreOne() {
  const spentIndex = shapeSlots.indexOf(false);
  if (spentIndex !== -1) { shapeSlots[spentIndex] = true; saveState(); renderTracker(); }
}
function showResetModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
function confirmReset(isConfirmed) {
  if (isConfirmed) { shapeSlots = Array(MAX_SHAPE_SLOTS).fill(true); saveState(); renderTracker(); }
  document.getElementById('modal-overlay').style.display = 'none';
}

document.getElementById("search").addEventListener("input", e => {
  const v = e.target.value.toLowerCase();
  document.querySelectorAll(".creature").forEach(card => {
      card.style.display = card.innerText.toLowerCase().includes(v) ? "" : "none";
  });
});

renderTracker();
renderAll();
</script>

</body>
</html>
