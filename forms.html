<!DOCTYPE html>
<html lang="ru">
<head>
<script src="forms.js"></script>
<script src="render_creature.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Облики друида</title>

<style>
:root {
  --bg: #0f061a;
  --card: #1a0f2b;
  --card-open: #24153a;
  --accent: #a855f7;
  --accent-light: #d8b4fe;
  --text: #e9d5ff;
  --gold: #c084fc;
}

body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: radial-gradient(circle at 20% 20%, #1a0f2b, #0f061a 80%);
  color: var(--text);
}

header {
  text-align: center;
  padding: 20px;
  background: #140a24;
  border-bottom: 2px solid var(--accent);
  box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
}

h1 { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; }
h1 span { color: var(--accent); font-size: 1.2em; }

/* Трэкер */
.wild-shape-tracker {
  margin-top: 15px;
  padding: 10px;
  background: rgba(0, 0, 0, 0.2);
  border-radius: 12px;
  display: inline-block;
}
.slots-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
.slot { width: 30px; height: 30px; border: 2px solid var(--accent); border-radius: 50%; cursor: pointer; position: relative; transition: 0.3s; }
.slot.active { background: var(--accent); box-shadow: 0 0 15px var(--accent), inset 0 0 5px white; }
.slot.spent { background: transparent; border-color: #4b218b; }
.slot.spent::after { content: "✕"; color: #4b218b; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

/* Поиск */
#search {
  width: 100%; padding: 12px; border-radius: 8px;
  border: 1px solid #5b21b6; background: rgba(20, 10, 36, 0.6); color: white;
  box-sizing: border-box; margin: 20px 0; font-family: inherit; outline: none;
}

/* Кнопки */
button { background: #1f1235; color: var(--text); border: 1px solid var(--accent); padding: 8px 12px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
button:hover { background: var(--accent); color: white; }
.btn-restore-all { border-color: var(--gold); color: var(--gold); }

.move-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(168,85,247,0.3);
  padding: 4px 12px;
  border-radius: 4px;
  color: var(--accent-light);
  margin-left: 10px;
  font-family: monospace;
  font-weight: bold;
}

/* Секции */
main { max-width: 800px; margin: auto; padding: 15px; }
h2 {
  margin-top: 30px; font-size: 1.1rem; color: var(--accent-light);
  text-transform: uppercase; background: rgba(168, 85, 247, 0.1);
  padding: 8px 15px; border-left: 4px solid var(--accent);
}

/* Карточка существа */
.creature { border: 1px solid #5b21b6; border-radius: 10px; margin-bottom: 14px; background: var(--card); overflow: hidden; }
summary { padding: 12px; cursor: pointer; font-weight: bold; background: #1f1235; display: flex; justify-content: space-between; align-items: center; list-style: none; }
summary::-webkit-details-marker { display: none; }

/* Модалка */
#modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 100; justify-content: center; align-items: center; }
.modal-content { background: var(--card); border: 2px solid var(--accent); padding: 30px; border-radius: 15px; text-align: center; max-width: 300px; }

/* Стили из статблока (для render_creature.js) */
.content { padding: 15px; }
.top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
.top-grid b { color: var(--accent-light); }
.stats { display: grid; grid-template-columns: repeat(6, 1fr); text-align: center; margin: 12px 0; }
.stat-name { font-size: 0.7rem; color: var(--accent-light); }
.stat-value { font-size: 1.1rem; font-weight: bold; }
.stat-mod { font-size: 0.8rem; color: var(--gold); }
.section-title { margin-top: 12px; color: var(--accent-light); font-weight: bold; }
.action { margin-top: 6px; font-size: 0.9rem; padding: 6px; border-left: 2px solid var(--accent); background: rgba(168, 85, 247, 0.05); }
</style>
</head>

<body>

<header>
  <h1><span class="druid-icon">🐻</span>Дикие облики</h1>
  <div class="wild-shape-tracker">
    <div class="slots-row" id="slots-container"></div>
    <div class="controls">
      <button onclick="restoreOne()">+1 Заряд</button>
      <button class="btn-restore-all" onclick="showResetModal()">Длительный отдых</button>
    </div>
  </div>
</header>

<main>
  <input id="search" placeholder="Поиск облика...">

  <h2>Подготовленные облики</h2>
  <div id="prepared-forms"></div>

  <h2>Доступные формы</h2>
  <div id="available-forms"></div>
</main>

<div id="modal-overlay">
  <div class="modal-content">
    <h3 style="margin-top:0; color:var(--accent-light)">Длительный отдых?</h3>
    <p>Восстановить все заряды Дикого облика?</p>
    <div style="display:flex; gap:15px; justify-content:center; margin-top:20px;">
      <button onclick="confirmReset(true)" style="border-color:var(--gold); color:var(--gold)">Да</button>
      <button onclick="confirmReset(false)">Нет</button>
    </div>
  </div>
</div>

<script>
// --- Инициализация данных ---
let forms = typeof initialForms !== 'undefined' ? initialForms : [];

// Сортировка по алфавиту (добавляем этот блок)
forms.sort((a, b) => a.name.localeCompare(b.name));

const MAX_SHAPE_SLOTS = 3;
let shapeSlots = JSON.parse(localStorage.getItem('wild_shape_slots')) || Array(MAX_SHAPE_SLOTS).fill(true);

// Загрузка состояния подготовленных форм
const savedFormsState = localStorage.getItem('prepared_forms_data');
if (savedFormsState) {
    const preparedNames = JSON.parse(savedFormsState);
    forms.forEach(f => {
        f.prepared = preparedNames.includes(f.name);
    });
}

function saveAll() {
    localStorage.setItem('wild_shape_slots', JSON.stringify(shapeSlots));
    const preparedNames = forms.filter(f => f.prepared).map(f => f.name);
    localStorage.setItem('prepared_forms_data', JSON.stringify(preparedNames));
}

// --- Логика Трэкера ---
function renderTracker() {
  const container = document.getElementById('slots-container');
  container.innerHTML = '';
  shapeSlots.forEach((isActive, index) => {
    const slotDiv = document.createElement('div');
    slotDiv.className = `slot ${isActive ? 'active' : 'spent'}`;
    slotDiv.onclick = () => { shapeSlots[index] = !shapeSlots[index]; saveAll(); renderTracker(); };
    container.appendChild(slotDiv);
  });
}

function restoreOne() {
  const spentIndex = shapeSlots.indexOf(false);
  if (spentIndex !== -1) { shapeSlots[spentIndex] = true; saveAll(); renderTracker(); }
}

function showResetModal() { document.getElementById('modal-overlay').style.display = 'flex'; }

function confirmReset(isConfirmed) {
  if (isConfirmed) { shapeSlots = Array(MAX_SHAPE_SLOTS).fill(true); saveAll(); renderTracker(); }
  document.getElementById('modal-overlay').style.display = 'none';
}

// --- Логика Списка Форм ---
function toggleFormPrepared(index) {
    forms[index].prepared = !forms[index].prepared;
    saveAll();
    renderApp();
}

function createFormElement(creature, index) {
    // Используем вашу функцию renderStatBlock из render_creature.js
    const htmlString = renderStatBlock(creature);

    // Оборачиваем в div, чтобы манипулировать summary
    const wrapper = document.createElement('div');
    wrapper.innerHTML = htmlString;
    const details = wrapper.querySelector('details');
    details.className = 'creature';

    const summary = details.querySelector('summary');
    const nameText = summary.innerText;

    // Создаем кастомный заголовок с кнопкой
    summary.innerHTML = `
        <span>${nameText}</span>
        <button class="move-btn" onclick="event.stopPropagation(); toggleFormPrepared(${index})">
            ${creature.prepared ? '−' : '+'}
        </button>
    `;

    return details;
}

function renderApp() {
    const preparedContainer = document.getElementById('prepared-forms');
    const availableContainer = document.getElementById('available-forms');

    preparedContainer.innerHTML = '';
    availableContainer.innerHTML = '';

    forms.forEach((f, index) => {
        const el = createFormElement(f, index);
        if (f.prepared) {
            preparedContainer.appendChild(el);
        } else {
            availableContainer.appendChild(el);
        }
    });
}

// Поиск
document.getElementById("search").addEventListener("input", e => {
  const v = e.target.value.toLowerCase();
  document.querySelectorAll(".creature").forEach(card => {
      card.style.display = card.innerText.toLowerCase().includes(v) ? "" : "none";
  });
});

// Старт
renderTracker();
renderApp();
</script>

</body>
</html>
